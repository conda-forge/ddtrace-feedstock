context:
  name: ddtrace
  version: 2.20.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/ddtrace-${{ version }}.tar.gz
  sha256: f185c6dd88cd04884f0ad27b37f14d837274e8fc4dc43407781334d92d41c3bc
  patches:
    - 001-patch-out-cmake-build-dep.patch

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - ddtrace-run = ddtrace.commands.ddtrace_run:main

requirements:
  build:
    - if: build_platform != target_platform
      then:
      - python
      - cross-python_${{ target_platform }}
      - setuptools-rust <2
      - cython
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('rust') }}
    - ${{ stdlib("c") }}
    - cmake
    - ninja
    - make
  host:
    - python
    - setuptools-scm >=4
    - cython
    - cmake >=3.24.2,<3.28
    - setuptools-rust <2
    - legacy-cgi >=2.0.0
    - pip
  run:
    - python
    - envier >=0.5,<1.dev0
    - importlib-metadata <=6.5.0
    - opentelemetry-api >=1
    - protobuf >=3
    - typing_extensions
    - xmltodict >=0.12
    - wrapt >=1

tests:
  - python:
      imports:
        - ddtrace
  - requirements:
      run:
        - pip
    script:
      - pip check
      - ddtrace-run --help

about:
  summary: Datadog APM client library
  license: 0BSD AND Apache-2.0 AND BSD-3-Clause
  homepage: https://ddtrace.readthedocs.io/
  license_file:
    - LICENSE
    - LICENSE.BSD3
    - LICENSE.Apache
    - NOTICE

extra:
  recipe-maintainers:
    - aymondebroglie
    - SarvarD
    - zbowling
